name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Checkout build
        run: |
          ls -al dist
          zip -r dist.zip dist package.json package-lock.json

      - name: Cache
        uses: actions/cache@v4
        with:
          key: cache-${{ github.run_id }}
          path: dist.zip

  deploy:
    runs-on: ubuntu-latest

    needs: build

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Resume cache
        uses: actions/cache@v4
        with:
          key: cache-${{ github.run_id }}
          path: dist.zip

      - name: Unpack cache
        run: |
          unzip -o dist.zip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_Token }}
          command: |
            pages deploy ./dist --project-name=matrindex-site --branch=main
